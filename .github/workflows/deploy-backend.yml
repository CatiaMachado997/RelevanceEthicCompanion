name: Deploy Backend to Railway

# This workflow is a standalone gate for backend-only changes.
# For full-stack deploys (both services), see ci.yml which runs
# the same tests and triggers both deploys together.

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'

jobs:
  test:
    name: Backend Tests (pre-deploy gate)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run full test suite
        run: pytest tests/ -v --tb=short --ignore=tests/test_e2e_smoke.py
        env:
          DATABASE_URL: "postgresql://test:test@localhost:5432/test"
          POSTGRES_SERVER: "localhost"
          POSTGRES_PORT: "5432"
          POSTGRES_DB: "test"
          POSTGRES_USER: "test"
          POSTGRES_PASSWORD: "test"
          GROQ_API_KEY: "test-key"
          GEMINI_API_KEY: "test-key"
          TAVILY_API_KEY: "test-key"
          SECRET_KEY: "ci-test-secret-key-must-be-32-chars-minimum-x"
          ENVIRONMENT: "development"
          AUTH_ENFORCEMENT_ENABLED: "false"
          SUPABASE_URL: "https://test.supabase.co"
          SUPABASE_JWT_AUDIENCE: "authenticated"
          WEAVIATE_URL: "http://localhost:8080"

  deploy:
    name: Deploy to Railway
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy backend to Railway
        working-directory: backend
        run: railway up --service backend --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Print deploy summary
        run: echo "Backend deployed to Railway. Check https://railway.app for status."
