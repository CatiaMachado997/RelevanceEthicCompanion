name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Backend Tests & Quality Checks
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Format check (Black)
        run: black --check .

      - name: Lint (Flake8)
        run: flake8 . --max-line-length=120 --exclude=venv,__pycache__,.git

      - name: Type check (MyPy)
        run: mypy . --ignore-missing-imports --exclude venv

      - name: Run tests with coverage
        run: |
          pytest tests/ -v --cov=. --cov-report=xml --cov-report=term-missing
        env:
          DATABASE_URL: "postgresql://test:test@localhost:5432/test"
          POSTGRES_SERVER: "localhost"
          POSTGRES_PORT: "5432"
          POSTGRES_DB: "test"
          POSTGRES_USER: "test"
          POSTGRES_PASSWORD: "test"
          GROQ_API_KEY: "test-key"
          GEMINI_API_KEY: "test-key"
          TAVILY_API_KEY: "test-key"
          WEAVIATE_URL: "http://localhost:8080"
          SECRET_KEY: "ci-test-secret-key-must-be-32-chars-minimum-x"
          ALGORITHM: "HS256"
          ACCESS_TOKEN_EXPIRE_MINUTES: "30"
          GOOGLE_CLOUD_PROJECT: "test-project"
          ENVIRONMENT: "test"
          SUPABASE_URL: "https://test.supabase.co"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: backend/coverage.xml
          flags: backend
          fail_ci_if_error: false

  # Frontend Tests & Quality Checks
  frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm run test -- --passWithNoTests

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: "http://localhost:8000"
          # Dummy Supabase credentials for the Next.js static-export step.
          # Prerender imports lib/supabase.ts at build time, which throws
          # without these set. The values aren't used at runtime in CI.
          NEXT_PUBLIC_SUPABASE_URL: "https://ci.supabase.co"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "ci-dummy-anon-key"

  # ESL-specific tests (Critical — must never drop below 75% coverage)
  esl-tests:
    name: ESL Critical Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run ESL tests
        run: |
          pytest tests/test_esl.py -v --tb=long
        env:
          DATABASE_URL: "postgresql://test:test@localhost:5432/test"
          POSTGRES_SERVER: "localhost"
          POSTGRES_PORT: "5432"
          POSTGRES_DB: "test"
          POSTGRES_USER: "test"
          POSTGRES_PASSWORD: "test"
          GROQ_API_KEY: "test-key"
          GEMINI_API_KEY: "test-key"
          TAVILY_API_KEY: "test-key"
          SECRET_KEY: "ci-test-secret-key-must-be-32-chars-minimum-x"
          ALGORITHM: "HS256"
          ACCESS_TOKEN_EXPIRE_MINUTES: "30"
          GOOGLE_CLOUD_PROJECT: "test-project"
          ENVIRONMENT: "test"
          SUPABASE_URL: "https://test.supabase.co"

      - name: Check ESL coverage
        run: |
          pytest tests/test_esl.py --cov=esl --cov-report=term-missing --cov-fail-under=75
        env:
          DATABASE_URL: "postgresql://test:test@localhost:5432/test"
          POSTGRES_SERVER: "localhost"
          POSTGRES_PORT: "5432"
          POSTGRES_DB: "test"
          POSTGRES_USER: "test"
          POSTGRES_PASSWORD: "test"
          GROQ_API_KEY: "test-key"
          GEMINI_API_KEY: "test-key"
          TAVILY_API_KEY: "test-key"
          SECRET_KEY: "ci-test-secret-key-must-be-32-chars-minimum-x"
          ALGORITHM: "HS256"
          ACCESS_TOKEN_EXPIRE_MINUTES: "30"
          GOOGLE_CLOUD_PROJECT: "test-project"
          ENVIRONMENT: "test"
          SUPABASE_URL: "https://test.supabase.co"
