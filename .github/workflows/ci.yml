name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Backend Tests & Quality Checks ──────────────────────────────────────────
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Format check (Black)
        run: black --check .

      - name: Lint (Flake8)
        run: flake8 . --max-line-length=120 --exclude=venv,__pycache__,.git

      - name: Run tests with coverage
        run: |
          pytest tests/ -v --cov=. --cov-report=xml --cov-report=term-missing \
            --ignore=tests/test_e2e_smoke.py
        env:
          DATABASE_URL: "postgresql://test:test@localhost:5432/test"
          POSTGRES_SERVER: "localhost"
          POSTGRES_PORT: "5432"
          POSTGRES_DB: "test"
          POSTGRES_USER: "test"
          POSTGRES_PASSWORD: "test"
          GROQ_API_KEY: "test-key"
          GEMINI_API_KEY: "test-key"
          TAVILY_API_KEY: "test-key"
          WEAVIATE_URL: "http://localhost:8080"
          SECRET_KEY: "ci-test-secret-key-must-be-32-chars-minimum-x"
          ALGORITHM: "HS256"
          ACCESS_TOKEN_EXPIRE_MINUTES: "30"
          ENVIRONMENT: "development"
          AUTH_ENFORCEMENT_ENABLED: "false"
          SUPABASE_URL: "https://test.supabase.co"
          SUPABASE_JWT_AUDIENCE: "authenticated"

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: backend/coverage.xml
          flags: backend
          fail_ci_if_error: false

  # ── ESL Critical Tests ───────────────────────────────────────────────────────
  esl-tests:
    name: ESL Critical Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run ESL tests + enforce 75% coverage
        run: |
          pytest tests/test_esl.py -v --tb=long \
            --cov=esl --cov-report=term-missing --cov-fail-under=75
        env:
          DATABASE_URL: "postgresql://test:test@localhost:5432/test"
          POSTGRES_SERVER: "localhost"
          POSTGRES_DB: "test"
          POSTGRES_USER: "test"
          POSTGRES_PASSWORD: "test"
          GROQ_API_KEY: "test-key"
          GEMINI_API_KEY: "test-key"
          TAVILY_API_KEY: "test-key"
          SECRET_KEY: "ci-test-secret-key-must-be-32-chars-minimum-x"
          ALGORITHM: "HS256"
          ACCESS_TOKEN_EXPIRE_MINUTES: "30"
          POSTGRES_PORT: "5432"
          ENVIRONMENT: "development"
          AUTH_ENFORCEMENT_ENABLED: "false"
          SUPABASE_URL: "https://test.supabase.co"

  # ── Frontend Build & Type Check ──────────────────────────────────────────────
  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: "http://localhost:8000"
          NEXT_PUBLIC_SUPABASE_URL: "https://ci.supabase.co"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "ci-dummy-anon-key"

  # ── Deploy (only on main, after all tests pass) ───────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [backend, esl-tests, frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Frontend → Vercel ──────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy frontend to Vercel (production)
        working-directory: frontend
        run: vercel --prod --token=${{ secrets.VERCEL_TOKEN }} --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      # ── Backend → Railway ──────────────────────────────────────────────────
      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy backend to Railway
        working-directory: backend
        run: railway up --service backend --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
