name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # Backend Tests & Quality Checks
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install black flake8 mypy pytest-cov

      - name: Format check (Black)
        run: black --check .
        continue-on-error: true

      - name: Lint (Flake8)
        run: flake8 . --max-line-length=120 --exclude=venv,__pycache__,.git
        continue-on-error: true

      - name: Type check (MyPy)
        run: mypy . --ignore-missing-imports --exclude venv
        continue-on-error: true

      - name: Run tests with coverage
        run: |
          pytest tests/ -v --cov=. --cov-report=xml --cov-report=term-missing
        env:
          # Mock environment variables for testing
          DATABASE_URL: "postgresql://test:test@localhost:5432/test"
          GROQ_API_KEY: "test-key"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: backend/coverage.xml
          flags: backend
          fail_ci_if_error: false

  # Frontend Tests & Quality Checks
  frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Type check
        run: npx tsc --noEmit
        continue-on-error: true

      - name: Run tests
        run: npm run test -- --passWithNoTests
        continue-on-error: true

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: "http://localhost:8000"

  # ESL-specific tests (Critical)
  esl-tests:
    name: ESL Critical Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run ESL tests
        run: |
          pytest tests/test_esl.py -v --tb=long
        env:
          DATABASE_URL: "postgresql://test:test@localhost:5432/test"
          GROQ_API_KEY: "test-key"

      - name: Check ESL coverage
        run: |
          pytest tests/test_esl.py --cov=esl --cov-report=term-missing --cov-fail-under=75
        env:
          DATABASE_URL: "postgresql://test:test@localhost:5432/test"
          GROQ_API_KEY: "test-key"
